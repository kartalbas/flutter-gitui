name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.44.4"

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      # Same scope as the analysis below, so the gate matches what the repository
      # was formatted with. Keeping it enforced stops future diffs from mixing
      # real changes with reformatting noise.
      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib test

      # Scoped to the application sources on purpose: the lint_rules/ package
      # does not compile against analyzer 8.x and is analyzed by its own job.
      - name: Analyze application code
        run: flutter analyze lib test

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test --reporter expanded

  build:
    name: Build ${{ matrix.platform }}
    needs: analyze
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
          # Pinned deliberately: ubuntu-latest floats onto newer Ubuntu images and
          # raises the glibc floor of every produced bundle, which ships no libc
          # or libstdc++ of its own and therefore resolves both from the host.
          # 22.04 provides glibc 2.35, matching the core22 base the snap declares
          # (release/manifests/snap/snapcraft.yaml).
          - platform: linux
            os: ubuntu-22.04
          - platform: macos
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev libnotify-dev

      - name: Resolve dependencies
        run: flutter pub get

      - name: Build ${{ matrix.platform }}
        run: flutter build ${{ matrix.platform }} --release

      # Fails loudly if a future runner-image bump lifts the required glibc above
      # the core22 floor, instead of producing a binary that refuses to start on
      # Ubuntu 22.04 or Debian 12. Mirrors the gate in
      # release/docker/Dockerfile.linux-build.
      - name: Verify glibc floor
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          cd build/linux/x64/release/bundle
          GLIBC_MAX=$(objdump -T flutter_gitui lib/*.so | grep -o 'GLIBC_[0-9][0-9.]*' | sed 's/GLIBC_//' | sort -V | tail -1)
          echo "highest required glibc: $GLIBC_MAX"
          { [ "${GLIBC_MAX%%.*}" -eq 2 ] && [ "${GLIBC_MAX#*.}" -le 35 ]; } || { echo "::error::bundle requires glibc $GLIBC_MAX, above the core22 floor 2.35"; exit 1; }

      - name: Collect build output
        shell: bash
        run: |
          mkdir -p dist
          case "${{ matrix.platform }}" in
            windows) cp -r build/windows/x64/runner/Release dist/flutter-gitui ;;
            linux)   cp -r build/linux/x64/release/bundle   dist/flutter-gitui ;;
            macos)   cp -r build/macos/Build/Products/Release/*.app dist/ ;;
          esac

      - uses: actions/upload-artifact@v4
        with:
          name: flutter-gitui-${{ matrix.platform }}
          path: dist/
          retention-days: 14
