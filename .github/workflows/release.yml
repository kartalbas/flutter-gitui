name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (without leading v), e.g. 1.0.0"
        required: true

env:
  FLUTTER_VERSION: "3.44.4"

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
          # Pinned deliberately: ubuntu-latest floats onto newer Ubuntu images and
          # raises the glibc floor of every published bundle, which ships no libc
          # or libstdc++ of its own and therefore resolves both from the host.
          # 22.04 provides glibc 2.35, matching the core22 base the snap declares
          # (release/manifests/snap/snapcraft.yaml).
          - platform: linux
            os: ubuntu-22.04
          # macOS is deliberately absent from the RELEASE matrix while the build
          # is ad-hoc signed with no hardened runtime: Gatekeeper refuses such an
          # app with "is damaged and can't be opened", so publishing it would
          # ship an artifact that cannot start. CI still builds macOS on every
          # push, so compile breakage is caught; only publishing waits for a
          # Developer ID certificate and notarisation.
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Stamp version into pubspec
        shell: bash
        run: |
          sed -i.bak -E "s/^version: .*/version: ${{ steps.version.outputs.value }}/" pubspec.yaml
          rm -f pubspec.yaml.bak
          grep '^version:' pubspec.yaml

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev libnotify-dev

      - name: Resolve dependencies
        run: flutter pub get

      - name: Build ${{ matrix.platform }}
        # Bash on every runner (Windows included) so the ${GITHUB_SHA::7} substring
        # expansion is portable; without these defines BuildInfo falls back to
        # 'unknown' and the shipped archive reports itself as "Build: dev".
        shell: bash
        run: |
          flutter build ${{ matrix.platform }} --release \
            --dart-define=BUILD_COMMIT="${GITHUB_SHA::7}" \
            --dart-define=BUILD_DATE="$(date -u +%Y-%m-%d)"

      # Fails loudly if a future runner-image bump lifts the required glibc above
      # the core22 floor, instead of shipping a binary that refuses to start on
      # Ubuntu 22.04 or Debian 12. Mirrors the gate in
      # release/docker/Dockerfile.linux-build.
      - name: Verify glibc floor
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          cd build/linux/x64/release/bundle
          GLIBC_MAX=$(objdump -T flutter_gitui lib/*.so | grep -o 'GLIBC_[0-9][0-9.]*' | sed 's/GLIBC_//' | sort -V | tail -1)
          echo "highest required glibc: $GLIBC_MAX"
          { [ "${GLIBC_MAX%%.*}" -eq 2 ] && [ "${GLIBC_MAX#*.}" -le 35 ]; } || { echo "::error::bundle requires glibc $GLIBC_MAX, above the core22 floor 2.35"; exit 1; }

      - name: Package artifact
        id: package
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.value }}"
          NAME="flutter-gitui-v${VERSION}-${{ matrix.platform }}"
          mkdir -p dist

          # Flat archives: the in-app updater extracts an update straight over
          # the installation directory, so a wrapping top-level folder would
          # leave every installed file untouched. It also keeps the published
          # layout equal to the one release/shared/create-archive.ps1 produces.
          case "${{ matrix.platform }}" in
            windows)
              cp -r build/windows/x64/runner/Release "dist/${NAME}"
              (cd "dist/${NAME}" && 7z a -tzip "../${NAME}.zip" . >/dev/null)
              ;;
            linux)
              cp -r build/linux/x64/release/bundle "dist/${NAME}"
              (cd dist && tar -czf "${NAME}.tar.gz" -C "${NAME}" .)
              ;;
            macos)
              APP=$(find build/macos/Build/Products/Release -maxdepth 1 -name '*.app' | head -1)
              [ -n "$APP" ] || { echo "::error::no .app produced"; exit 1; }
              ditto -c -k --sequesterRsrc --keepParent "$APP" "dist/${NAME}.zip"
              ;;
          esac

          ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            dist/*.zip
            dist/*.tar.gz
          retention-days: 30

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: List artifacts
        run: ls -la dist/

      - name: Determine release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="v${{ inputs.version }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          # The client derives its channel from the pre-release suffix of its
          # own version, so the release has to carry the matching flag. Reading
          # it off the tag is what keeps a stable install from ever being
          # offered an alpha; a checkbox somebody has to remember would not.
          case "${TAG#v}" in
            *-*) PRERELEASE=true ;;
            *) PRERELEASE=false ;;
          esac
          {
            echo "tag=${TAG}"
            echo "prerelease=${PRERELEASE}"
          } >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          draft: true
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          files: |
            dist/*.zip
            dist/*.tar.gz

      # The updater reads the manifest as an asset of the very release it is
      # about to install from, so the digest and the archive it describes can
      # never come from different builds. It runs after the release exists
      # because the changelog is the release notes GitHub just generated.
      - name: Attach update manifests
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.tag }}"
          VERSION="${TAG#v}"
          RELEASE_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          CHANGELOG=$(gh release view "$TAG" --json body --jq .body)
          for PLATFORM in windows linux; do
            case "$PLATFORM" in
              windows) FILE="flutter-gitui-v${VERSION}-windows.zip" ;;
              linux) FILE="flutter-gitui-v${VERSION}-linux.tar.gz" ;;
            esac
            if [ ! -f "dist/$FILE" ]; then
              echo "::error::missing dist/$FILE"
              exit 1
            fi
            jq -n \
              --arg version "$VERSION" \
              --arg releaseDate "$RELEASE_DATE" \
              --arg changelog "$CHANGELOG" \
              --arg platform "$PLATFORM" \
              --arg fileName "$FILE" \
              --argjson fileSize "$(stat -c %s "dist/$FILE")" \
              --arg sha256 "$(sha256sum "dist/$FILE" | cut -d ' ' -f 1)" \
              '{version: $version, releaseDate: $releaseDate, changelog: $changelog, platform: $platform}
               + {($platform): {fileName: $fileName, fileSize: $fileSize, sha256: $sha256, platform: $platform}}' \
              > "dist/latest-${PLATFORM}.json"
          done
          gh release upload "$TAG" dist/latest-windows.json dist/latest-linux.json --clobber
