name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (without leading v), e.g. 1.0.0"
        required: true

env:
  FLUTTER_VERSION: "3.44.4"

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
          - platform: linux
            os: ubuntu-latest
          - platform: macos
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Stamp version into pubspec
        shell: bash
        run: |
          sed -i.bak -E "s/^version: .*/version: ${{ steps.version.outputs.value }}/" pubspec.yaml
          rm -f pubspec.yaml.bak
          grep '^version:' pubspec.yaml

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev libnotify-dev

      - name: Resolve dependencies
        run: flutter pub get

      - name: Build ${{ matrix.platform }}
        run: flutter build ${{ matrix.platform }} --release

      - name: Package artifact
        id: package
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.value }}"
          NAME="flutter-gitui-v${VERSION}-${{ matrix.platform }}"
          mkdir -p dist

          case "${{ matrix.platform }}" in
            windows)
              cp -r build/windows/x64/runner/Release "dist/${NAME}"
              (cd dist && 7z a -tzip "${NAME}.zip" "${NAME}" >/dev/null)
              ;;
            linux)
              cp -r build/linux/x64/release/bundle "dist/${NAME}"
              (cd dist && tar -czf "${NAME}.tar.gz" "${NAME}")
              ;;
            macos)
              APP=$(find build/macos/Build/Products/Release -maxdepth 1 -name '*.app' | head -1)
              [ -n "$APP" ] || { echo "::error::no .app produced"; exit 1; }
              ditto -c -k --sequesterRsrc --keepParent "$APP" "dist/${NAME}.zip"
              ;;
          esac

          ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            dist/*.zip
            dist/*.tar.gz
          retention-days: 30

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: List artifacts
        run: ls -la dist/

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            dist/*.zip
            dist/*.tar.gz
